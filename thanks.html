<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Спасибо — Панацея</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=3">
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    .thanks-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .thanks-box {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      padding: 56px 40px;
      max-width: 520px;
      width: 100%;
    }
    .thanks-box i {
      font-size: 3.5rem;
      color: var(--color-accent);
      margin-bottom: 24px;
      display: block;
    }
    .thanks-box h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--color-white);
      margin-bottom: 16px;
      font-weight: 600;
    }
    .thanks-box p {
      color: var(--color-text-muted);
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .thanks-box .btn {
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="thanks-page">
    <div class="thanks-box">
      <i class="fas fa-check-circle"></i>
      <h1>Спасибо за заявку!</h1>
      <p>Мы получили вашу заявку и свяжемся с вами в течение рабочего дня. Если ситуация срочная — напишите нам в <a href="https://t.me/panaceyateam" target="_blank" style="color: var(--color-accent); text-decoration: none;">Telegram</a>.</p>
      <a href="index.html" class="btn btn-primary">Вернуться на главную</a>
    </div>
  </div>
</body>
</html>
